name: Keep Backend Alive

on:
schedule:
- cron: '*/10 * * * *'
workflow_dispatch:

jobs:
ping-backend:
runs-on: ubuntu-latest

```
steps:
  - name: Ping the backend
    run: |
      echo "Pinging backend at $(date)"
      curl -f https://vedika-backend-fgvd.onrender.com || echo "Ping failed but continuing"
      echo "Ping completed"
```
